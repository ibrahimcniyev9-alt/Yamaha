<!DOCTYPE html>
<html lang="az">
<head>

<title>Ad günün mübarək!</title>
<style>
body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

h1 {
    margin-top: 100px;
    font-size: 40px;
}

p {
    font-size: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: white;
    color: #ff4b5c;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

    background: #ffe6e6;
}

</head>

<body>

<h1>🎉 Xurma, Ad Günün Mübarək! 🎂</h1>
<p>Sənə uzun ömür, xoşbəxtlik və uğurlar arzulayıram! 💖</p>

<button onclick="mesaj()">Sürpriz 🎁</button>

<script>
function mesaj() {
    alert("Xurma 🎉 Sən ən yaxşı dostsan! Ad günün mübarək! ❤️");
}
</script>

</body>
</html>
